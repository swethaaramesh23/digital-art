<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Stackly</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
        .error-code { font-size: 10rem; font-weight: 800; line-height: 1; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; animation: float 4s infinite alternate; }
        .error-msg { font-size: 1.5rem; margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="aurora-bg"><div class="glow-3"></div></div>

    <div class="reveal tilt-card">
        <div class="tilt-card-inner">
            <div class="error-code">404</div>
            <h2 class="error-msg">Page Not Found</h2>
            <p style="color: var(--text-muted); margin-bottom: 3rem; max-width: 400px; margin-left: auto; margin-right: auto;">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <a href="index.html" class="btn btn-primary magnetic-btn">Return Home</a>
        </div>
    </div>

    <script src="js/main.js?v=2"></script>
</body>
</html>
