<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Stackly</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 120px 0 2rem; /* Offset for fixed header */
            overflow-y: auto;
            overflow-x: hidden;
        }
        .auth-container { width: 100%; max-width: 500px; padding: 2rem; z-index: 10; }
        .auth-card {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 3rem 2.5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .auth-logo { text-align: center; margin-bottom: 2rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--accent-1); font-weight: 600; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-logo"><img src="lo.webp" alt="Stackly"></div>
        <div class="loader-bar"></div>
    </div>

    <div class="aurora-bg">
        <div class="glow-3"></div>
    </div>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="lo.webp" alt="Stackly Logo"></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="marketplace.html">Marketplace</a></li>
                <li><a href="collections.html">Collections</a></li>
                <li><a href="artists.html">Artists</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a href="login.html" class="btn btn-outline magnetic-btn">Login</a>
            </div>
        </div>
    </header>

    <div class="auth-container reveal tilt-card">
        <div class="auth-card tilt-card-inner">
            <div class="auth-logo">
                <a href="index.html" class="logo">
                    <img src="lo.webp" alt="Stackly Logo">
                </a>
            </div>
            <h2 style="text-align: center; margin-bottom: 0.5rem;">Create an Account</h2>
            <p style="text-align: center; margin-bottom: 2rem; color: var(--text-muted);">Join the world's largest digital art marketplace.</p>
            
            <form id="authForm">
                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" placeholder="Jane Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" placeholder="@janedoe" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="roleSelect" required>
                        <option value="user">User</option>
                        <option value="artist">Artist</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="magnetic-btn" style="width: 100%;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                </div>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
